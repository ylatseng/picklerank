# ─── Netlify Configuration for PickleRank ────────────────────────────────────
# Place this file in your PROJECT ROOT (same folder as package.json).

[build]
  command = "npm run build"
  publish = "dist"

# ─── Secrets Scanning ────────────────────────────────────────────────────────
# Firebase web API keys (AIza...) are intentionally public client identifiers,
# not secrets. Disabling smart detection to prevent false positive build failures.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# ─── SPA Routing ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
