# ─── Netlify Configuration for PickleRank ────────────────────────────────────
# Place this file in your PROJECT ROOT (same folder as package.json),
# NOT inside the src/ folder.

[build]
  command = "npm run build"
  publish = "dist"

# ─── Secrets Scanning ────────────────────────────────────────────────────────
# Firebase web API keys start with "AIza" and are intentionally public —
# they identify your Firebase project to the browser SDK, not grant admin access.
# Access control is managed by Firebase Security Rules, not by hiding this key.
# This line tells Netlify to ignore "AIza" prefixed values during scanning.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"

# ─── SPA Routing ─────────────────────────────────────────────────────────────
# Redirect all routes to index.html so React Router handles navigation.
# Without this, refreshing any non-root URL returns a 404 from Netlify.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
