<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d2e1a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PickleRank" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta name="description" content="Private pickleball ELO rating tracker for your group." />
    <meta name="application-name" content="PickleRank" />

    <title>PickleRank 🥒</title>

    <style>
      :root {
        --safe-area-top: env(safe-area-inset-top);
        --safe-area-bottom: env(safe-area-inset-bottom);
      }
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        /* Prevent bounce on iOS */
        overscroll-behavior-y: none;
        /* Lock the page itself so it can't scroll — only <main> inside the
           app scrolls. Without this, position:sticky on the header has no
           proper scroll container to stick within, so it drifts with the
           page instead of staying pinned. */
        overflow: hidden;
        position: fixed;
        inset: 0;
      }
      #root {
        height: 100%;
        /* Safe-area insets are already applied individually by the header
           (padding-top) and main/bottom-nav (padding-bottom) in styles.js —
           applying it again here would double the gap under the notch. */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
