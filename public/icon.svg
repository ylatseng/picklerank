<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark rounded square (iOS/Android style) -->
  <rect width="512" height="512" rx="112" fill="#0d2e1a"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#50c878" stroke-width="6" opacity="0.3"/>
  
  <!-- Pickleball paddle silhouette -->
  <!-- Paddle head (oval) -->
  <ellipse cx="256" cy="200" rx="115" ry="130" fill="#50c878"/>
  <!-- Paddle holes pattern (pickleball paddle has holes) -->
  <ellipse cx="256" cy="175" rx="18" ry="18" fill="#0d2e1a" opacity="0.7"/>
  <ellipse cx="220" cy="200" rx="18" ry="18" fill="#0d2e1a" opacity="0.7"/>
  <ellipse cx="292" cy="200" rx="18" ry="18" fill="#0d2e1a" opacity="0.7"/>
  <ellipse cx="256" cy="225" rx="18" ry="18" fill="#0d2e1a" opacity="0.7"/>
  <ellipse cx="220" cy="150" rx="14" ry="14" fill="#0d2e1a" opacity="0.7"/>
  <ellipse cx="292" cy="150" rx="14" ry="14" fill="#0d2e1a" opacity="0.7"/>
  <!-- Paddle handle -->
  <rect x="232" y="318" width="48" height="100" rx="24" fill="#c8a050"/>
  <!-- Handle grip wrap lines -->
  <line x1="238" y1="340" x2="274" y2="340" stroke="#0d2e1a" stroke-width="3" opacity="0.5"/>
  <line x1="238" y1="355" x2="274" y2="355" stroke="#0d2e1a" stroke-width="3" opacity="0.5"/>
  <line x1="238" y1="370" x2="274" y2="370" stroke="#0d2e1a" stroke-width="3" opacity="0.5"/>
  <line x1="238" y1="385" x2="274" y2="385" stroke="#0d2e1a" stroke-width="3" opacity="0.5"/>
  <!-- Paddle throat connector -->
  <rect x="230" y="308" width="52" height="20" rx="6" fill="#a07830"/>
  
  <!-- Pickleball (yellow-green ball) in upper right -->
  <circle cx="350" cy="130" r="46" fill="#c8d840"/>
  <!-- Ball texture lines -->
  <path d="M 318 108 Q 350 84 382 108" fill="none" stroke="#a0b020" stroke-width="3"/>
  <path d="M 306 130 Q 350 176 394 130" fill="none" stroke="#a0b020" stroke-width="3"/>
  <path d="M 318 152 Q 350 176 382 152" fill="none" stroke="#a0b020" stroke-width="3"/>
  
  <!-- PR text at bottom -->
  <text x="256" y="455" 
    font-family="Arial Black, Arial, sans-serif" 
    font-weight="900" 
    font-size="64" 
    fill="#50c878" 
    text-anchor="middle"
    letter-spacing="4">PR</text>
</svg>